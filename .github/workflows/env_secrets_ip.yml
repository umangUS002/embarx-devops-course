name: Demo CI ENV Secrets

on:
    workflow_dispatch:
    #push

jobs:
    build:
        runs-on: ubuntu-latest

        steps:
            - name: Say Hello
              run: echo "Hello from the 2nd workflow!"

            - name: Install
              env:
                APP_ENV: demo
                DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
              run: echo "Environment $APP_ENV using $DB_PASSWORD"
            
            - name: Create demo file
              run: |
                echo "Hello from CI Pipeline" > demo.txt
                echo "File created successfully"
  
            - name: Upload demo
              uses: actions/upload-artifact@v7
              with:
                name: build-artifacts-demo
                path: .

    test:
      runs-on: ubuntu-latest
      needs: build
      steps:
          - name: Test Job
            run: echo "Test Job!"
              